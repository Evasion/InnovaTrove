<svg xmlns="http://www.w3.org/2000/svg" width="260" height="60" viewBox="0 0 260 60" aria-label="InnovaTrove">
  <defs>
    <linearGradient id="hex-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Hex 1 filled -->
  <polygon points="19,11 35.5,20.5 35.5,39.5 19,49 2.5,39.5 2.5,20.5" fill="url(#hex-light)"/>
  <!-- Hex 2 outline -->
  <polygon points="37,11 53.5,20.5 53.5,39.5 37,49 20.5,39.5 20.5,20.5"
    fill="none" stroke="url(#hex-light)" stroke-width="2.5"/>
  <!-- I monogram -->
  <rect x="13"  y="16"   width="12" height="3.5" rx="1.5" fill="white"/>
  <rect x="17"  y="16"   width="4"  height="28"  rx="1.5" fill="white"/>
  <rect x="13"  y="40.5" width="12" height="3.5" rx="1.5" fill="white"/>
  <!-- Wordmark -->
  <text x="66" y="38" font-size="23" font-weight="700" fill="#0f172a"
    font-family="'Segoe UI', system-ui, sans-serif">Innova<tspan fill="#3b82f6">Trove</tspan></text>
</svg>
